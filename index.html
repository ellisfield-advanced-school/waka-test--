            align-items: center;

        }
        .quiz-container {
            background-color: white;

            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;

        .progress { color: #666; font-size: 14px; margin-bottom: 15px; }
        .btn {
            background-color: white;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #f7f9fa; }
        .choice-btn { font-size: 18px; letter-spacing: 0.5px; }
        .action-btn {

            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;

        .correct { color: #2ecc71; border-color: #2ecc71 !important; background-color: #eafeec; }

    { english: "the prettiest", japanese: "pretty (かわいい) の最上級" },
    { english: "the most beautiful", japanese: "beautiful (美しい) の最上級" },
    { english: "the most careful", japanese: "careful (注意深い) の最上級" },
    { english: "the most delicious", japanese: "delicious (おいしい) の最上級" },
    { english: "the most difficult", japanese: "difficult (難しい) の最上級" },
    { english: "the most easily", japanese: "easily (簡単に) の最上級" },
    { english: "the most exciting", japanese: "exciting (わくわくする) の最上級" },
    { english: "the most expensive", japanese: "expensive (高価な) の最上級" },
    { english: "the most famous", japanese: "famous (有名な) の最上級" },
    { english: "the most important", japanese: "important (重要な) の最上級" },
    { english: "the most interesting", japanese: "interesting (おもしろい) の最上級" },
    { english: "the most popular", japanese: "popular (人気のある) の最上級" },
    { english: "the most useful", japanese: "useful (便利な) の最上級" },
    { english: "the best", japanese: "good (良い) / well (元気に・上手に) の最上級" },
    { english: "the worst", japanese: "bad (悪い) / ill (病気の) の最上級" },
    { english: "the most", japanese: "many (多い[数]) / much (多い[量]) の最上級" },
    { english: "the least", japanese: "little (少しの[量]) の最上級" }
];
 
let currentCategory = ""; 
let currentWords = []; 
let currentIndex = 0; 
let score = 0; 
let isAnswered = false;

function showCategoryScreen() {
    document.getElementById("category-screen").style.display = "block";
    document.getElementById("quiz-screen").style.display = "none"; 
    document.getElementById("result-screen").style.display = "none";
    
    const catListDiv = document.getElementById("category-list");
    catListDiv.innerHTML = "";
    
    // 特定の不規則動詞や比較級カテゴリを最後に持ってくる並び替え処理
    const specialCats = ["不規則動詞 (過去形)", "不規則動詞 (過去分詞)", "形容詞・副詞 (比較級)", "形容詞・副詞 (最上級)"];
    const allCats = Object.keys(wordData);
    const sortedCategories = allCats.filter(cat => !specialCats.includes(cat));
    specialCats.forEach(cat => {
        if (allCats.includes(cat)) sortedCategories.push(cat);
    });

    sortedCategories.forEach(category => {
        const btn = document.createElement("button"); 
        btn.className = "btn"; 
        btn.innerText = category; 
        btn.onclick = () => startQuiz(category); 
        catListDiv.appendChild(btn);
    });
}

function startQuiz(category) {
    currentCategory = category; 
    currentWords = [...wordData[category]].sort(() => Math.random() - 0.5);
    if (currentWords.length > 10) { currentWords = currentWords.slice(0, 10); }
    currentIndex = 0; 
    score = 0;
    document.getElementById("category-screen").style.display = "none";
    document.getElementById("quiz-screen").style.display = "block"; 
    showQuestion();
}

function showQuestion() {
    isAnswered = false;
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("result-message").innerText = "";
    
    const currentQuestion = currentWords[currentIndex];
    document.getElementById("progress").innerText = `第 ${currentIndex + 1} 問 / 全 ${currentWords.length} 問`; 
    document.getElementById("japanese-word").innerHTML = currentQuestion.japanese;
    
    const choices = makeChoices(currentQuestion.english, wordData[currentCategory]); 
    const choicesListDiv = document.getElementById("choices-list"); 
    choicesListDiv.innerHTML = "";
    
    choices.forEach(choice => {
        const btn = document.createElement("button"); 
        btn.className = "btn choice-btn"; 
        
        // --- 比較級・最上級の文字部分赤色化処理 ---
        let htmlResult = choice;
        if (currentCategory === "形容詞・副詞 (比較級)" || currentCategory === "形容詞・副詞 (最上級)") {
            const irregulars = ["better", "worse", "less", "best", "worst", "least"];
            let isIrregular = false;
            irregulars.forEach(irr => {
                if (choice === irr || choice === "the " + irr) {
                    htmlResult = htmlResult.replace(irr, `<span style="color: red; font-weight: bold;">${irr}</span>`);
                    isIrregular = true;
                }
            });
            if (!isIrregular) {
                if (choice.includes("more ") || choice.includes("most ")) {
                    htmlResult = htmlResult.replace("more", '<span style="color: red; font-weight: bold;">more</span>');
                    htmlResult = htmlResult.replace("most", '<span style="color: red; font-weight: bold;">most</span>');
                } else {
                    if (choice.endsWith("est")) {
                        if (choice.endsWith("ggest")) htmlResult = choice.slice(0, -5) + '<span style="color: red; font-weight: bold;">ggest</span>';
                        else if (choice.endsWith("ttest")) htmlResult = choice.slice(0, -5) + '<span style="color: red; font-weight: bold;">ttest</span>';
                        else htmlResult = choice.slice(0, -3) + '<span style="color: red; font-weight: bold;">est</span>';
                    } else if (choice.endsWith("er")) {
                        if (choice.endsWith("gger")) htmlResult = choice.slice(0, -4) + '<span style="color: red; font-weight: bold;">gger</span>';
                        else if (choice.endsWith("tter")) htmlResult = choice.slice(0, -4) + '<span style="color: red; font-weight: bold;">tter</span>';
                        else htmlResult = choice.slice(0, -2) + '<span style="color: red; font-weight: bold;">er</span>';
                    }
                }
            }
        }
        
        btn.innerHTML = htmlResult; 
        btn.onclick = () => checkAnswer(btn, choice, currentQuestion.english); 
        choicesListDiv.appendChild(btn);
    });
}

function makeChoices(correctAnswer, allCategoryWords) {
    const specialCategories = ["不規則動詞 (過去形)", "不規則動詞 (過去分詞)", "形容詞・副詞 (比較級)", "形容詞・副詞 (最上級)"];
    
    if (specialCategories.includes(currentCategory)) {
        let finalChoices = [correctAnswer];
        const currentWord = allCategoryWords.find(w => w.english === correctAnswer);
        if (currentWord && currentWord.ing) {
            finalChoices.push(currentWord.ing);
        }
        let otherWords = allCategoryWords.filter(w => w.english !== correctAnswer);
        otherWords.sort(() => Math.random() - 0.5);
        for (let i = 0; i < otherWords.length; i++) {
            if (finalChoices.length >= 4) break;
            finalChoices.push(otherWords[i].english);
        }
        while (finalChoices.length < 4) {
            finalChoices.push("went", "made", "computer", "cheaper");
        }
        return finalChoices.sort(() => Math.random() - 0.5);
    }
    
    // 通常カテゴリ（曜日や月など）のダミー作成
    const allEnglish = allCategoryWords.map(w => w.english); 
    let dummies = allEnglish.filter(eng => eng !== correctAnswer); 
    dummies.sort(() => Math.random() - 0.5); 
    let chosenDummies = dummies.slice(0, 3);
    while (chosenDummies.length < 3) {
        chosenDummies.push("apple", "book", "desk", "test"); 
    }
    let finalChoices = [correctAnswer, ...chosenDummies.slice(0, 3)];
    return finalChoices.sort(() => Math.random() - 0.5);
}

function checkAnswer(clickedBtn, selected, correct) {
    if (isAnswered) return; 
    isAnswered = true; 
    const choiceButtons = document.querySelectorAll(".choice-btn"); 
    const resultMsg = document.getElementById("result-message");
    
    if (selected === correct) {
        clickedBtn.classList.add("correct"); 
        resultMsg.innerText = "⭕ 正解！";
        resultMsg.style.color = "#2ecc71"; 
        score++; 
    } else { 
        clickedBtn.classList.add("incorrect"); 
        resultMsg.innerText = `❌ 不正解！ 正解は: ${correct}`; 
        resultMsg.style.color = "#e74c3c";
        choiceButtons.forEach(btn => { 
            // ボタン内のHTML（spanタグ）を無視して純粋なテキストで正解判定
            if (btn.textContent.trim() === correct || btn.innerText.trim() === correct) { 
                btn.classList.add("correct"); 
            } 
        }); 
    }
    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() { 
    currentIndex++;
    if (currentIndex < currentWords.length) { 
        showQuestion(); 
    } else { 
        showResult(); 
    } 
}

function showResult() {
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    document.getElementById("final-score").innerText = `${currentWords.length} 問中 ${score} 問 正解！`;
}

function speakWord() {
    if (!('speechSynthesis' in window)) {
        alert('このブラウザは音声再生に対応していません。Chromeをご利用ください。');
        return;
    }
    const currentQuestion = currentWords[currentIndex];
    let word = currentQuestion.english.replace(/～/g, '').replace(/~/g, '').trim();
    
    if (word === "read" && currentQuestion.japanese.includes("過去")) {
        word = "red";
    }
    speechSynthesis.cancel();
    const uttr = new SpeechSynthesisUtterance(word);
    uttr.lang = 'en-US';
    uttr.rate = 1.0;
    speechSynthesis.speak(uttr);
}

// アプリ起動
showCategoryScreen();
</script>
